name: CI

# Runs on every pull request (the primary ask) and on pushes to main so the
# baseline stays green between PRs.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      # Ruff (linter) — config in pyproject.toml ([tool.ruff]).
      - name: Ruff (lint)
        run: uvx ruff check .

      # Ruff (formatter) — config in pyproject.toml ([tool.ruff]).
      - name: Ruff (format)
        run: uvx ruff format --check .

      # Mypy (static type-check) — config in pyproject.toml ([tool.mypy]); it
      # pins the files to check (skills/markdown-review/mdedit.py).
      - name: Mypy
        run: uvx mypy

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # mdedit.py declares a 3.10+ minimum; test the floor and current releases.
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      # Run the pure-pytest suite against the matrix. Dependencies come from the
      # committed uv.lock via the `test` dependency group (PEP 735); `--frozen`
      # makes CI fail rather than silently re-resolving, so the lock is the
      # source of truth. The browser tests `importorskip` Playwright, so they
      # are skipped here and exercised in the dedicated `browser-test` job
      # below. Test discovery is configured via [tool.pytest.ini_options] in
      # pyproject.toml (testpaths = ["skills"]).
      - name: Run tests
        run: uv run --frozen --python ${{ matrix.python-version }} --group test pytest -v

  browser-test:
    name: Browser tests
    runs-on: ubuntu-latest
    # The headless-Chromium regression tests for inline comment highlighting.
    # Heavier than the plain pytest job (downloads a browser), so it runs on a
    # single Python version rather than the full matrix; the highlight code is
    # pure JS and not Python-version sensitive.
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      # Cache the downloaded Chromium binary across runs. Keyed on the
      # playwright version pinned in uv.lock so a bump invalidates it.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('uv.lock') }}
          restore-keys: ${{ runner.os }}-playwright-

      # Install the `browser` dependency group (pytest + playwright) from the
      # lock, then download the Chromium build Playwright drives. `--with-deps`
      # also installs the system libraries Chromium needs on a bare runner.
      - name: Install browser
        run: uv run --frozen --group browser python -m playwright install --with-deps chromium

      - name: Run tests
        run: uv run --frozen --group browser pytest -v
